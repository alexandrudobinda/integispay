<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</helmet>
<header style="position:sticky;top:0;z-index:100;background:{{ headerBg }};backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid rgba(13,27,46,0.09);font-family:'IBM Plex Sans',system-ui,sans-serif;">
  <div style="max-width:1200px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0;">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="30" height="30" rx="8" fill="#FFFFFF" stroke="rgba(18,179,154,0.45)"></rect>
        <path d="M9 21 L16 7 L23 21" stroke="#12B39A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M12 16 L20 16" stroke="#7C6CF0" stroke-width="2.2" stroke-linecap="round"></path>
      </svg>
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;letter-spacing:-0.02em;color:#1B2A3F;">Integis<span style="color:#12B39A;">Pay</span></span>
    </a>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex;align-items:center;gap:30px;">
        <sc-for list="{{ links }}" as="link" hint-placeholder-count="5">
          <a href="{{ link.href }}" style="position:relative;text-decoration:none;font-size:14.5px;font-weight:500;color:{{ link.color }};letter-spacing:-0.01em;transition:color .2s;padding:6px 0;" style-hover="color:#1B2A3F;">{{ link.label }}</a>
        </sc-for>
        <a href="Contact.dc.html#book" style="background:#12B39A;color:#FFFFFF;text-decoration:none;font-weight:600;font-size:14px;padding:10px 18px;border-radius:9px;letter-spacing:-0.01em;box-shadow:0 4px 18px rgba(18,179,154,0.22);transition:transform .15s,box-shadow .2s;" style-hover="transform:translateY(-1px);box-shadow:0 6px 22px rgba(18,179,154,0.34);">Book a call</a>
      </nav>
    </sc-if>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="Contact.dc.html#book" style="background:#12B39A;color:#FFFFFF;text-decoration:none;font-weight:600;font-size:13.5px;padding:9px 15px;border-radius:9px;">Book a call</a>
        <button onClick="{{ toggle }}" aria-label="Menu" style="width:42px;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#FFFFFF;border:1px solid rgba(13,27,46,0.12);border-radius:10px;cursor:pointer;padding:0;">
          <span style="display:block;width:18px;height:2px;background:#1B2A3F;border-radius:2px;"></span>
          <span style="display:block;width:18px;height:2px;background:#1B2A3F;border-radius:2px;"></span>
          <span style="display:block;width:18px;height:2px;background:#1B2A3F;border-radius:2px;"></span>
        </button>
      </div>
    </sc-if>
  </div>

  <sc-if value="{{ showMenu }}" hint-placeholder-val="{{ false }}">
    <nav style="display:flex;flex-direction:column;padding:8px 16px 18px;border-top:1px solid rgba(13,27,46,0.08);background:#EAEEF4;">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="5">
        <a href="{{ link.href }}" style="text-decoration:none;font-size:16px;font-weight:500;color:{{ link.color }};padding:13px 8px;border-bottom:1px solid rgba(13,27,46,0.06);">{{ link.label }}</a>
      </sc-for>
    </nav>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:68},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;crypto&quot;,&quot;mica&quot;,&quot;cases&quot;,&quot;about&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { isMobile: false, open: false, scrolled: false };

  componentDidMount() {
    this.mq = window.matchMedia('(max-width: 860px)');
    this._apply = () => this.setState({ isMobile: this.mq.matches, open: false });
    this._apply();
    this.mq.addEventListener('change', this._apply);
    this.onScroll = () => {
      const s = window.scrollY > 8;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this.onScroll, { passive: true });
  }

  componentWillUnmount() {
    this.mq && this.mq.removeEventListener('change', this._apply);
    window.removeEventListener('scroll', this.onScroll);
  }

  renderVals() {
    const active = this.props.active || 'home';
    const links = [
      { href: 'Home.dc.html', label: 'Home', key: 'home' },
      { href: 'CryptoIntegrations.dc.html', label: 'Crypto Integrations', key: 'crypto' },
      { href: 'MiCAGuide.dc.html', label: 'EU & MiCA', key: 'mica' },
      { href: 'CaseStudies.dc.html', label: 'Case Studies', key: 'cases' },
      { href: 'Contact.dc.html', label: 'About', key: 'about' },
    ].map(l => ({ ...l, color: l.key === active ? '#1B2A3F' : '#93A0B4' }));

    return {
      links,
      isMobile: this.state.isMobile,
      isDesktop: !this.state.isMobile,
      showMenu: this.state.isMobile && this.state.open,
      toggle: () => this.setState(s => ({ open: !s.open })),
      headerBg: this.state.scrolled ? 'rgba(234,238,244,0.9)' : 'rgba(234,238,244,0.6)',
    };
  }
}
</script>
</body>
</html>
