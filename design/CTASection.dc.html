<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<section style="font-family:'IBM Plex Sans',system-ui,sans-serif;padding:96px 24px;">
  <div style="max-width:980px;margin:0 auto;position:relative;border:1px solid {{ glowBorder }};border-radius:22px;background:{{ glowBg }};overflow:hidden;padding:64px 40px;text-align:center;">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at 50% 0%, black, transparent 72%);-webkit-mask-image:radial-gradient(circle at 50% 0%, black, transparent 72%);pointer-events:none;"></div>
    <div style="position:relative;">
      <span style="display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:{{ accent }};margin-bottom:20px;">Ready when you are</span>
      <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4.4vw,44px);line-height:1.08;letter-spacing:-0.025em;color:#0E1A2B;margin:0 auto 18px;max-width:680px;">{{ heading }}</h2>
      <p style="margin:0 auto 34px;max-width:560px;font-size:16.5px;line-height:1.6;color:#647389;">Book a free integration call. We'll map your use case, confirm compliance fit, and scope a go-live plan — no commitment.</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
        <a href="{{ bookHref }}" style="background:{{ accent }};color:#FFFFFF;text-decoration:none;font-weight:600;font-size:15.5px;padding:15px 28px;border-radius:11px;box-shadow:0 6px 26px {{ accentShadow }};transition:transform .15s,box-shadow .2s;" style-hover="transform:translateY(-2px);box-shadow:0 10px 32px {{ accentShadowHover }};">Book a free integration call</a>
        <a href="{{ secondaryHref }}" style="background:rgba(13,27,46,0.05);color:#1B2A3F;text-decoration:none;font-weight:500;font-size:15.5px;padding:15px 26px;border-radius:11px;border:1px solid rgba(13,27,46,0.16);transition:border-color .2s,background .2s;" style-hover="border-color:{{ accentBorderHover }};background:{{ accentSoft }};">See what's included</a>
      </div>
    </div>
  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:420},&quot;edition&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;crypto&quot;,&quot;saas&quot;],&quot;default&quot;:&quot;crypto&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const isSaas = (this.props.edition || 'crypto') === 'saas';
    const accent = isSaas ? '#E8623C' : '#12B39A';
    return {
      accent,
      accentShadow: isSaas ? 'rgba(232,98,60,0.3)' : 'rgba(18,179,154,0.28)',
      accentShadowHover: isSaas ? 'rgba(232,98,60,0.42)' : 'rgba(18,179,154,0.4)',
      accentSoft: isSaas ? 'rgba(232,98,60,0.06)' : 'rgba(18,179,154,0.06)',
      accentBorderHover: isSaas ? 'rgba(232,98,60,0.5)' : 'rgba(18,179,154,0.5)',
      glowBorder: isSaas ? 'rgba(232,98,60,0.22)' : 'rgba(18,179,154,0.22)',
      glowBg: isSaas
        ? 'radial-gradient(120% 160% at 50% -20%, rgba(232,98,60,0.14) 0%, rgba(232,98,60,0.06) 38%, rgba(234,238,244,0) 70%), #F2F5F9'
        : 'radial-gradient(120% 160% at 50% -20%, rgba(18,179,154,0.14) 0%, rgba(18,179,154,0.06) 38%, rgba(234,238,244,0) 70%), #F2F5F9',
      heading: isSaas
        ? 'Recurring billing in crypto + fiat — integrated for your SaaS in days, not months.'
        : 'Accept crypto + fiat the compliant way — integrated for you in days, not months.',
      bookHref: isSaas ? 'Contact-SaaS.dc.html#book' : 'Contact.dc.html#book',
      secondaryHref: isSaas ? 'SaaSIntegrations.dc.html' : 'CryptoIntegrations.dc.html',
    };
  }
}
</script>
</body>
</html>
